<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mes Mods Minecraft</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #1e1e1e;
        color: white;
        display: flex;
        height: 100vh;
    }

    /* Sidebar gauche */
    #sidebar {
        width: -260px;
        background: #2b2b2b;
        border-left: 2px solid #444;
        padding: 20px;
        overflow-y: auto;
    }

    #sidebar h2 {
        margin-top: 0;
        text-align: center;
    }

    .mod-item {
        padding: 10px;
        margin: 8px 0;
        background: #3a3a3a;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    .mod-item:hover {
        background: #505050;
    }

    /* Zone centrale */
    #content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
    }

    .btn {
        display: inline-block;
        padding: 10px 15px;
        margin: 10px 5px 0 0;
        background: #4caf50;
        color: white;
        border-radius: 5px;
        text-decoration: none;
    }

    .btn:hover {
        background: #45a049;
    }

    pre {
        background: #111;
        padding: 15px;
        border-radius: 8px;
        white-space: pre-wrap;
        word-wrap: break-word;
    }
</style>
</head>
<body>

<!-- Contenu principal -->
<div id="content">
    <h1>Bienvenue</h1>
    <p>Sélectionne un mod dans la liste à droite.</p>
</div>

<!-- Sidebar droite -->
<div id="sidebar">
    <h2>Mes Mods</h2>

    <div class="mod-item" onclick="showMod('blockname')">
        BlockName
    </div>

    <!-- Tu peux ajouter d'autres mods ici -->
</div>

<script>

function showMod(mod) {
    if (mod === "blockname") {
        document.getElementById("content").innerHTML = `
            <h1>BlockName</h1>
            <p>Mod d'affichage avancé des informations de blocs.</p>

            <a class="btn" href="https://modrinth.com/mod/blockname" target="_blank">
                Télécharger sur Modrinth
            </a>

            <a class="btn" href="#" onclick="showLicense()">
                Voir la licence
            </a>
        `;
    }
}

function showLicense() {
    document.getElementById("content").innerHTML = `
        <h1>Licence</h1>
        <pre>${LICENSE_TEXT}</pre>
    `;
}
</script>

</body>
</html>
