<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BlockName – Mods Minecraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --accent: #4caf50;
    --accent-hover: #56c25a;
    --radius: 14px;
    --transition: 0.25s ease;
}

@media (prefers-color-scheme: dark) {
:root {
    --bg: #0f1115;
    --bg-alt: #181b22;
    --text: #f5f5f5;
    --muted: #a0a0a0;
    --border: #2a2e3a;
}
}

@media (prefers-color-scheme: light) {
:root {
    --bg: #f5f5f5;
    --bg-alt: #ffffff;
    --text: #1a1a1a;
    --muted: #555;
    --border: #d0d0d0;
}
}

body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
}

#langSelector {
    position: fixed;
    top: 12px;
    right: 12px;
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    color: var(--muted);
    cursor: pointer;
    transition: var(--transition);
    z-index: 99;
}

#content {
    flex: 1;
    padding: 24px;
}

#card {
    background: var(--bg-alt);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 24px;
    max-width: 800px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    transition: var(--transition);
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

h1 { margin: 0 0 8px; font-size: 28px; display: flex; align-items: center; gap: 12px; }
h2 { margin: 0 0 12px; font-size: 18px; color: var(--muted); }
p  { color: var(--muted); }

.btn-row { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }

.btn {
    padding: 10px 16px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 14px;
    background: var(--accent);
    color: white;
    transition: var(--transition);
    border: none;
    cursor: pointer;
}

.btn.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
}

.btn:hover { background: var(--accent-hover); }
.btn.secondary:hover { background: rgba(255,255,255,0.05); }

pre {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid var(--border);
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 60vh;
    overflow: auto;
}

#extra { margin-top: 16px; }

#sidebar {
    width: 260px;
    background: var(--bg-alt);
    border-left: 1px solid var(--border);
    padding: 20px;
    transition: var(--transition);
    flex-shrink: 0;
}

.mod-item {
    padding: 10px;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    cursor: pointer;
    margin-bottom: 10px;
    transition: var(--transition);
}

.mod-item:hover { background: rgba(255,255,255,0.05); }
.mod-item strong { display: block; margin-bottom: 4px; }
.mod-item div { color: var(--muted); font-size: 12px; }

#logo { width: 40px; height: 40px; border-radius: 6px; }

.key-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.key-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); }
.key-table tr:last-child td { border-bottom: none; }
.key {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-family: monospace;
    font-size: 13px;
    color: var(--text);
}

.wiki-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
}
.wiki-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-decoration: none;
    color: var(--text);
    transition: var(--transition);
    display: block;
}
.wiki-card:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); }
.wiki-card strong { display: block; margin-bottom: 4px; font-size: 14px; }
.wiki-card span { font-size: 12px; color: var(--muted); }

@media (max-width: 800px) {
    body { flex-direction: column-reverse; }
    #sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); display: flex; overflow-x: auto; padding: 12px; gap: 10px; }
    .mod-item { min-width: 180px; flex-shrink: 0; margin-bottom: 0; }
    .wiki-grid { grid-template-columns: 1fr; }
}
</style>
</head>

            <button class="btn secondary" onclick="showWiki()">📖 Wiki</button>
            <a class="btn secondary" href="https://paypal.me/lefilou20yt?country.x=FR&locale.x=fr_FR" target="_blank">❤️ Soutenir</a>
        </div>

        <div id="extra"></div>

    </div>
</div>

<div id="sidebar">

    </div>
    <div class="mod-item" onclick="openComments()">

let currentLang = "auto";

function detectLang() {
    const l = navigator.language.slice(0, 2);
    return translations[l] ? l : "en";
}

function applyTranslations(lang) {
    const t = translations[lang];
    document.getElementById("title").textContent        = t.title;
    document.getElementById("subtitle").textContent     = t.subtitle;
    document.getElementById("description1").textContent = t.desc1;
    document.getElementById("description2").textContent = t.desc2;
    document.getElementById("downloadBtn").textContent  = t.download;
    document.getElementById("licenseBtn").textContent   = t.license;
    document.getElementById("translateBtn").textContent = t.translateLicense;
    document.getElementById("sidebarBlockName").textContent = t.sidebarName;
    document.getElementById("sidebarDesc").textContent  = t.sidebarDesc;
}

function changeLang(value) {
    currentLang = value;
    applyTranslations(value === "auto" ? detectLang() : value);
}

changeLang("auto");

function showLicense() {
    document.getElementById("extra").innerHTML =
        `<h2>📄 License</h2><pre>${LICENSE_TEXT}</pre>`;
}

function translateLicense() {
    const lang = currentLang === "auto" ? detectLang() : currentLang;
    const t = translations[lang];
    document.getElementById("extra").innerHTML =
        `<h2>${t.translatedTitle}</h2><pre>${translatedVersions[lang] || translatedVersions.en}</pre>`;
}
