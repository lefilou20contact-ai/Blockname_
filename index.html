<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BlockName – Mods Minecraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --accent: #4caf50;
        --accent-hover: #56c25a;
        --radius: 14px;
        --transition: 0.25s ease;
    }

    /* Mode sombre */
    @media (prefers-color-scheme: dark) {
        :root {
            --bg: #0f1115;
            --bg-alt: #181b22;
            --text: #f5f5f5;
            --muted: #a0a0a0;
            --border: #2a2e3a;
        }
    }

    /* Mode clair */
    @media (prefers-color-scheme: light) {
        :root {
            --bg: #f5f5f5;
            --bg-alt: #ffffff;
            --text: #1a1a1a;
            --muted: #555;
            --border: #d0d0d0;
        }
    }

    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        min-height: 100vh;
        transition: background var(--transition), color var(--transition);
    }

    /* Sélecteur de langue */
    #langSelector {
        position: fixed;
        top: 12px;
        right: 12px;
        background: var(--bg-alt);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 6px 10px;
        color: var(--muted);
        cursor: pointer;
        transition: var(--transition);
    }

    #content {
        flex: 1;
        padding: 24px;
    }

    #card {
        background: var(--bg-alt);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        padding: 24px;
        max-width: 800px;
        box-shadow: 0 18px 40px rgba(0,0,0,0.25);
        transition: var(--transition);
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 { margin: 0 0 8px; font-size: 28px; display: flex; align-items: center; gap: 12px; }
    h2 { margin: 0 0 12px; font-size: 18px; color: var(--muted); }

    p { color: var(--muted); }

    .btn-row { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }

    .btn {
        padding: 10px 16px;
        border-radius: 999px;
        text-decoration: none;
        font-size: 14px;
        background: var(--accent);
        color: white;
        transition: var(--transition);
        border: none;
        cursor: pointer;
    }

    .btn.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
    }

    .btn:hover { background: var(--accent-hover); }
    .btn.secondary:hover { background: rgba(255,255,255,0.05); }

    pre {
        background: var(--bg);
        border-radius: var(--radius);
        padding: 16px;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        word-wrap: break-word;
        max-height: 60vh;
        overflow: auto;
    }

    #sidebar {
        width: 260px;
        background: var(--bg-alt);
        border-left: 1px solid var(--border);
        padding: 20px;
        transition: var(--transition);
    }

    .mod-item {
        padding: 10px;
        border-radius: var(--radius);
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--border);
        cursor: pointer;
        margin-bottom: 10px;
        transition: var(--transition);
    }

    .mod-item:hover {
        background: rgba(255,255,255,0.05);
    }

    /* Responsive */
    @media (max-width: 800px) {
        body { flex-direction: column-reverse; }
        #sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); display: flex; overflow-x: auto; }
        .mod-item { min-width: 180px; }
    }

    /* Logo */
    #logo {
        width: 40px;
        height: 40px;
        border-radius: 6px;
    }
</style>

<body>

<!-- Sélecteur de langue -->
<select id="langSelector" onchange="changeLang(this.value)">
    <option value="auto">🌍 Auto</option>
    <option value="fr">🇫🇷 Français</option>
    <option value="en">🇬🇧 English</option>
    <option value="es">🇪🇸 Español</option>

        <p id="description2"></p>

        <div class="btn-row">

            <button id="licenseBtn" class="btn secondary" onclick="showLicense()"></button>
            <button id="translateBtn" class="btn secondary" onclick="translateLicense()"></button>
        </div>

        <div id="extra"></div>
    </div>
</div>

<div id="sidebar">

    const userLang = navigator.language.slice(0,2);

}

// 🌍 APPLIQUER LES TRADUCTIONS
function applyTranslations(lang) {

    document.getElementById("sidebarDesc").textContent = t.sidebarDesc;

    // Animation douce
    document.getElementById("card").style.animation = "fadeIn 0.4s ease";
}

// 🌍 CHANGER DE LANGUE MANUELLEMENT
function changeLang(value) {
    currentLang = value;

    if (value === "auto") {
        applyTranslations(detectLang());
    } else {
        applyTranslations(value);

}
